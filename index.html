<!DOCTYPE html>
<html>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

<head>
    <title>Renjulibviewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="icon" type="image/png" href="app_icon.png">
    <link rel="apple-touch-icon" href="app_icon.png">
    <link rel="manifest" href="manifest.json">

    <link data-trunk rel="copy-file" href="app_icon.png" />
    <link data-trunk rel="copy-file" href="manifest.json" />

    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
        html,
        body,
        canvas {
            margin: 0px;
            padding: 0px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #222222;
            touch-action: none;
        }

        /* ---------------------------------------------------
           rfd が生成するダイアログ要素を適正サイズで上下に並べる
        --------------------------------------------------- */

        /* ファイルを選択するボタン (画面中央より少し上) */
        body>input[type="file"] {
            position: fixed !important;
            top: 40% !important;
            /* 画面の40%の高さ */
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            z-index: 99999 !important;
            background-color: #f9ebcf !important;
            /* 連珠盤カラー */
            padding: 15px 20px !important;
            border-radius: 12px !important;
            border: 2px solid #d4c19c !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5) !important;
            cursor: pointer !important;
            font-size: 40px !important;
            /* 大きめの文字 */
            color: #333 !important;
            max-width: 90% !important;
            /* 画面からはみ出さない */
        }

        /* ブラウザ標準の「ファイルを選択」パーツの調整 */
        body>input[type="file"]::file-selector-button {
            font-size: 40px !important;
            font-weight: bold !important;
            padding: 8px 16px !important;
            cursor: pointer !important;
            background-color: #ffffff !important;
            color: #333 !important;
            border: 2px solid #ccc !important;
            border-radius: 6px !important;
            margin-right: 15px !important;
        }

        /* キャンセルボタン (画面中央より少し下) */
        body>button {
            position: fixed !important;
            top: 60% !important;
            /* 画面の60%の高さ */
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            z-index: 99999 !important;
            font-size: 40px !important;
            /* 大きめの文字 */
            font-weight: bold !important;
            padding: 15px 40px !important;
            /* 余白を広げて指でタップしやすく */
            border-radius: 12px !important;
            background-color: #666666 !important;
            /* キャンセルらしいグレー */
            color: #ffffff !important;
            border: none !important;
            cursor: pointer !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5) !important;
            white-space: nowrap !important;
            /* 文字の折り返しを防ぐ */
        }
        /* カスタムモーダル用スタイル */
        .modal.hidden { display: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 20000; }
        .modal-content { background:#fff; padding:2rem; border-radius:12px; text-align:center; }
        .large-btn { font-size:28px; padding:1rem 2rem; margin:0.5rem; border:none; border-radius:12px; background:#666; color:#fff; }
    </style>
</head>

<body>
    <canvas id="the_canvas_id"></canvas>
    <script>
    // カスタムモーダルロジック
    const modal = document.getElementById('file-modal');
    const fileInput = document.getElementById('file-input');
    const chooseBtn = document.getElementById('modal-choose');
    const cancelBtn = document.getElementById('modal-cancel');

    // 動的に生成される <input type="file"> のクリックを捕捉
    document.addEventListener('click', (e) => {
        if (e.target.matches('input[type="file"]')) {
            e.preventDefault();
            modal.classList.remove('hidden');
        }
    });

    // モーダルから実際のファイルピッカーを起動
    chooseBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
        fileInput.click();
    });

    // キャンセル
    cancelBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
    });
    </script>
</body>

</html>
